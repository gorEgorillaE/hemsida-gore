<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Hemsida</title>
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, #0f172a, #1e1b4b, #312e81);
        color: white;
    }

    header {
        text-align: center;
        padding: 40px 20px;
        background: rgba(0,0,0,0.3);
        backdrop-filter: blur(10px);
    }

    header h1 {
        font-size: 3rem;
        margin-bottom: 10px;
    }

    nav {
        display: flex;
        justify-content: center;
        gap: 20px;
        padding: 15px;
        background: rgba(255,255,255,0.08);
    }

    nav a {
        color: white;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s;
    }

    nav a:hover {
        color: #2afadf;
    }

    main {
        max-width: 1000px;
        margin: 50px auto;
        text-align: center;
        padding: 20px;
    }

    .card {
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(12px);
        border-radius: 25px;
        padding: 40px;
        box-shadow: 0 0 30px rgba(0,0,0,0.3);
    }

    .card h2 {
        font-size: 2rem;
        margin-bottom: 15px;
    }

    .card p {
        color: #d1d5db;
        margin-bottom: 30px;
    }

    .anime-btn {
        display: inline-block;
        text-decoration: none;
        color: white;
        font-size: 1.3rem;
        font-weight: bold;
        padding: 18px 40px;
        border-radius: 50px;
        background: linear-gradient(
            45deg,
            #ff0080,
            #7928ca,
            #2afadf
        );
        background-size: 300% 300%;
        animation: glow 5s ease infinite;
        box-shadow:
            0 0 20px #ff0080,
            0 0 40px #7928ca;
        transition: 0.3s;
    }

    .anime-btn:hover {
        transform: scale(1.1);
        box-shadow:
            0 0 30px #ff0080,
            0 0 60px #2afadf;
    }

    @keyframes glow {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    footer {
        text-align: center;
        padding: 20px;
        margin-top: 50px;
        background: rgba(0,0,0,0.3);
    }
</style>

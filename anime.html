<!DOCTYPE html>

<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #0f172a;
        color: white;
        font-family: Arial, sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
    }

    header {
        padding: 15px;
        text-align: center;
        background: rgba(0,0,0,0.3);
    }

    .back-btn {
        display: inline-block;
        margin-top: 10px;
        padding: 10px 20px;
        text-decoration: none;
        color: white;
        border-radius: 999px;
        background: linear-gradient(45deg,#ff0080,#7928ca,#2afadf);
        background-size: 300% 300%;
        animation: glow 5s ease infinite;
    }

    iframe {
        flex: 1;
        width: 100%;
        border: none;
    }

    @keyframes glow {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
</style>

</head>
<body>

<header>
    <h1>✨ Anime ✨</h1>
    <a href="index.html" class="back-btn">⬅ Tillbaka</a>
</header>

<iframe src="https://neal.fun/"></iframe>

</body>
</html>
